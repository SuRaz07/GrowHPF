<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | Think Grow</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../../style.css">
</head>
<body>
	<main class="login-layout">
		<section class="auth-card" aria-labelledby="login-title">
			<div class="auth-brand">
				<img class="logo-icon" src="../../logo.jpeg" alt="ThinkGrow logo">
				<div class="logo-wordmark">
					<div class="grow">Think<span>Grow</span></div>
					
				</div>
			</div>

			<div class="auth-copy">
				<p class="eyebrow">Login</p>
				<h1 id="login-title">Welcome back</h1>
				<p class="lead">Sign in to continue your growth journey.</p>
			</div>

			<form id="login-form" novalidate>
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required autofocus>

				<label for="password">Password</label>
				<div class="input-with-action">
					<input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" minlength="6" required>
					<button type="button" class="show-password-btn" data-target="password" aria-label="Show password">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
							<circle cx="12" cy="12" r="3"/>
						</svg>
					</button>
				</div>

				<button type="submit" id="auth-submit">Sign In</button>
			</form>

			<p id="login-message" class="message" aria-live="polite"></p>
			<p class="auth-footer">
				<a href="signup.html">Need an account? Sign up</a>
			</p>
			<p class="auth-footer secondary">
				<a href="../../Landing%20page/landingpage.html">Back to landing page</a>
			</p>
		</section>
	</main>

	<script src="login.js"></script>
</body>
</html>
